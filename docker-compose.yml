x-worker-base: &worker-base
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - splat-tile-cache:/app/.splat_tiles
    - planner-data:/app/app/data
  environment:
    - HOME=/home/appuser
    - TERM=xterm
    - REDIS_HOST=redis
    - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    - SPLAT_TILE_CACHE=/app/.splat_tiles
  depends_on:
    - redis
  working_dir: "/app"
  restart: unless-stopped
  networks:
    - app-network

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./ui:/app/ui
      - splat-tile-cache:/app/.splat_tiles
      - planner-data:/app/app/data
    environment:
      - HOME=/home/appuser
      - TERM=xterm
      - VIRTUAL_HOST=site.meshtastic.org
      - VIRTUAL_PORT=8080
      - LETSENCRYPT_HOST=site.meshtastic.org
      - USE_CELERY=true
      - HEAVY_RADIUS_THRESHOLD_KM=${HEAVY_RADIUS_THRESHOLD_KM:-200}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    mem_limit: 12G
    ports:
      - 8080:8080
    depends_on:
      - redis
    working_dir: "/app"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080"]
    restart: unless-stopped
    networks:
      - app-network

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - 6379:6379
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command: ["sh", "-c", "if [ -n \"$$REDIS_PASSWORD\" ]; then exec redis-server --requirepass \"$$REDIS_PASSWORD\"; else exec redis-server; fi"]
    restart: unless-stopped
    networks:
      - app-network

  nginx-proxy:
    image: nginxproxy/nginx-proxy
    container_name: nginx-proxy
    ports:
      - 80:80
      - 443:443
    environment:
      - TRUST_DOWNSTREAM_PROXY=true
    volumes:
      # The vhost and conf volumes are only required
      # if you plan to obtain standalone certificates
      # - vhost:/etc/nginx/vhost.d
      # - conf:/etc/nginx/conf.d
      - html:/usr/share/nginx/html
      - certs:/etc/nginx/certs:ro
      - /var/run/docker.sock:/tmp/docker.sock:ro
    networks:
      - app-network

  acme-companion:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    environment:
      - DEFAULT_EMAIL=thebentern@meshtastic.org
    volumes_from:
      - nginx-proxy
    volumes:
      - certs:/etc/nginx/certs:rw
      - acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - app-network

  worker:
    <<: *worker-base
    command: ["celery", "-A", "app.tasks", "worker", "--loglevel=info",
              "--concurrency=1", "-Q", "default", "-n", "light@%h"]
    mem_limit: ${WORKER_LIGHT_MEM:-4G}
    deploy:
      replicas: ${CELERY_LIGHT_WORKERS:-2}

  worker-heavy:
    <<: *worker-base
    command: ["celery", "-A", "app.tasks", "worker", "--loglevel=info",
              "--concurrency=1", "-Q", "heavy,default", "-n", "heavy@%h"]
    mem_limit: ${WORKER_HEAVY_MEM:-8G}
    deploy:
      replicas: ${CELERY_HEAVY_WORKERS:-1}

  autoscaler:
    build:
      context: .
      dockerfile: Dockerfile
    user: root
    command: ["python", "-m", "app.autoscaler"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - MIN_LIGHT_WORKERS=${MIN_LIGHT_WORKERS:-1}
      - MAX_LIGHT_WORKERS=${MAX_LIGHT_WORKERS:-6}
      - MIN_HEAVY_WORKERS=${MIN_HEAVY_WORKERS:-1}
      - MAX_HEAVY_WORKERS=${MAX_HEAVY_WORKERS:-4}
      - SCALE_DOWN_DELAY=${SCALE_DOWN_DELAY:-120}
      - CHECK_INTERVAL=${CHECK_INTERVAL:-10}
      - COMPOSE_PROJECT=${COMPOSE_PROJECT_NAME:-meshtastic-site-planner}
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - app-network

  prefetch:
    <<: *worker-base
    profiles: ["prefetch"]
    command: ["python", "-m", "app.prefetch"]
    environment:
      - HOME=/home/appuser
      - TERM=xterm
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - SPLAT_TILE_CACHE=/app/.splat_tiles
      - PREFETCH_TOP_N=${PREFETCH_TOP_N:-50}
      - PREFETCH_INTERVAL_SECONDS=${PREFETCH_INTERVAL_SECONDS:-300}
      - PREFETCH_MIN_HITS=${PREFETCH_MIN_HITS:-2}

  flower:
    build: .
    environment:
      - HOME=/home/appuser
      - TERM=xterm
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    ports:
      - "5555:5555"
    depends_on:
      - redis
    working_dir: "/app"
    command: ["celery", "-A", "app.tasks", "flower", "--port=5555"]
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:

volumes:
  # vhost:
  # conf:
  html:
  certs:
  acme:
  planner-data:
  splat-tile-cache:
